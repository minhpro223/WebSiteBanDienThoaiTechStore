<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quản Lý Sản Phẩm</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
  </head>

  <body class="bg-gray-100">
    <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
      <!-- Navbar -->
      <nav class="bg-blue-600 text-white rounded">
        <div class="px-6 py-4 flex items-center gap-8">
          <a href="#" class="font-bold text-lg">Navbar</a>

          <a href="./index.html" class="hover:text-gray-200"> Home </a>
        </div>
      </nav>

      <!-- Header -->
      <h1
        class="text-3xl sm:text-4xl md:text-5xl lg:text-6xl font-thin text-gray-700 my-6 sm:my-8"
      >
        Danh Sách Sản Phẩm
      </h1>

      <!-- Tab -->
      <div class="border-b border-gray-300">
        <button
          class="bg-white border border-gray-300 border-b-white px-6 py-3 rounded-t"
        >
          Danh sách sản phẩm
        </button>
      </div>

      <!-- Toolbar -->
      <div
        class="flex flex-col md:flex-row md:justify-between md:items-center gap-4 mt-6 mb-4"
      >
        <button
          id="btnThemSP"
          onclick="openModal()"
          class="bg-green-500 hover:bg-green-600 text-white px-5 py-2 rounded"
        >
          <i class="fa fa-plus mr-2"></i>
          Thêm Mới
        </button>

        <div class="flex flex-col sm:flex-row gap-2 w-full md:w-auto">
          <input
            id="searchInput"
            type="text"
            placeholder="Nhập từ khóa"
            class="border border-gray-300 px-4 py-2 w-full sm:w-72 rounded"
          />

          <button class="border border-gray-300 bg-gray-100 px-4 py-2 rounded">
            <i class="fa fa-search"></i>
          </button>
        </div>
        <select
          id="sortPrice"
          class="border px-3 py-2 rounded w-full sm:w-auto"
        >
          <option value="all">All</option>
          <option value="asc">Giá tăng dần</option>
          <option value="desc">Giá giảm dần</option>
        </select>
      </div>

      <!-- Table -->
      <div class="bg-white shadow rounded overflow-x-auto">
        <table class="w-full min-w-[900px] border-collapse">
          <thead>
            <tr class="bg-gray-50">
              <th class="border p-3 text-left">STT</th>

              <th class="border p-3 text-left">Tên Sản Phẩm</th>

              <th class="border p-3 text-left">Giá</th>

              <th class="border p-3 text-left">Màn Hình</th>

              <th class="border p-3 text-left">Camera Sau</th>
              <th class="border p-3 text-left">Camera Trước</th>
              <th class="border p-3 text-left">Hình Ảnh</th>
              <th class="border p-3 text-left">Thể Loại</th>
              <th class="border p-3 text-left">Mô Tả</th>
              <th class="border p-3 text-left">Action</th>
            </tr>
          </thead>

          <tbody id="tblDanhSachSP">
            <!-- Render JS -->
          </tbody>
        </table>
      </div>
    </div>

    <!-- Modal -->

    <div
      id="myModal"
      class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50"
    >
      <div
        class="bg-white rounded-lg shadow-xl w-[95%] sm:w-[600px] max-h-[90vh] overflow-y-auto"
      >
        <!-- Header -->

        <div class="flex justify-between items-center border-b px-6 py-4">
          <h2 id="modalTitle" class="text-xl font-semibold">Thêm Sản Phẩm</h2>

          <button onclick="closeModal()" class="text-2xl text-gray-500">
            &times;
          </button>
        </div>

        <!-- Body -->

        <!-- Body -->
        <div class="p-6">
          <div class="mb-4">
            <label class="block mb-2 font-medium">Tên Sản Phẩm</label>
            <input
              id="TenSP"
              type="text"
              placeholder="Nhập tên sản phẩm"
              class="w-full border border-gray-300 rounded px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
            />
          </div>
          <span id="tbTenSP" class="text-red-500 text-sm"></span>

          <div class="mb-4">
            <label class="block mb-2 font-medium">Giá</label>
            <input
              id="GiaSP"
              type="number"
              placeholder="Nhập giá sản phẩm"
              class="w-full border border-gray-300 rounded px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
            />
          </div>
          <span id="tbGia" class="text-red-500 text-sm"></span>

          <div class="mb-4">
            <label class="block mb-2 font-medium">Màn Hình</label>
            <input
              id="ScreenSP"
              type="text"
              placeholder="Ví dụ: OLED 6.1 inch"
              class="w-full border border-gray-300 rounded px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
            />
          </div>
          <span id="tbManHinh" class="text-red-500 text-sm"></span>

          <div class="mb-4">
            <label class="block mb-2 font-medium">Camera Sau</label>
            <input
              id="BackCameraSP"
              type="text"
              placeholder="Ví dụ: 2 camera 12MP"
              class="w-full border border-gray-300 rounded px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
            />
          </div>
          <span id="tbCameraSau" class="text-red-500 text-sm"></span>

          <div class="mb-4">
            <label class="block mb-2 font-medium">Camera Trước</label>
            <input
              id="FrontCameraSP"
              type="text"
              placeholder="Ví dụ: 7MP"
              class="w-full border border-gray-300 rounded px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
            />
          </div>
          <span id="tbCameraTruoc" class="text-red-500 text-sm"></span>

          <div class="mb-4">
            <label class="block mb-2 font-medium">hình Ảnh</label>
            <input
              id="HinhSP"
              type="text"
              placeholder="Nhập URL hình ảnh"
              class="w-full border border-gray-300 rounded px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
            />
          </div>
          <span id="tbHinh" class="text-red-500 text-sm"></span>

          <div class="mb-4">
            <label class="block mb-2 font-medium">Loại</label>

            <select
              id="LoaiSP"
              class="w-full border border-gray-300 rounded px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
            >
              <option value="iphone">iPhone</option>
              <option value="samsung">Samsung</option>
              <option value="xiaomi">Xiaomi</option>
              <option value="oppo">Oppo</option>
              <option value="vivo">Vivo</option>
              <option value="realme">Realme</option>
            </select>
          </div>
          <span id="tbLoai" class="text-red-500 text-sm"></span>

          <div class="mb-4">
            <label class="block mb-2 font-medium">Mô Tả</label>

            <textarea
              id="MoTa"
              rows="4"
              class="w-full border border-gray-300 rounded px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
              placeholder="Nhập mô tả sản phẩm"
            ></textarea>
          </div>
          <span id="tbMoTa" class="text-red-500 text-sm"></span>
        </div>

        <!-- Footer -->

        <div id="modalFooter" class="border-t px-6 py-4 flex justify-end gap-3">
          <button onclick="closeModal()" class="px-4 py-2 border rounded">
            Hủy
          </button>

          <button
            class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded"
          >
            Lưu
          </button>
        </div>
      </div>
    </div>

    <script>
      const modal = document.getElementById("myModal");

      function openModal() {
        modal.classList.remove("hidden");
        modal.classList.add("flex");
      }

      function closeModal() {
        modal.classList.remove("flex");
        modal.classList.add("hidden");
      }
    </script>

    <!-- AXIOS -->

    <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.11.0/axios.min.js"></script>

    <script
      type="module"
      src="/capstone2-main/app/controllers/adminController.js"
    ></script>
  </body>
</html>
